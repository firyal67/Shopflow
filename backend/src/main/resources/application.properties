# Application
spring.application.name=shopflow-backend
server.port=${PORT:9090}

# Active profile: dev (H2) or prod (PostgreSQL)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE
spring.jpa.open-in-view=false

# H2 — désactivé car DataInitializer gère les données de démo
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false

# Swagger UI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui
springdoc.swagger-ui.operationsSorter=method

# JWT
app.jwt.secret=${JWT_SECRET:ShopFlowSuperSecretKeyForJWTTokenGenerationMustBe256BitsLong2024}
app.jwt.access-token-expiration=${JWT_ACCESS_EXPIRATION:28800000}
app.jwt.refresh-token-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:4200,https://shopflow-git-main-feryel.vercel.app}
