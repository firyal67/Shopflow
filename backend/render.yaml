services:
  - type: web
    name: shopflow-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: shopflow-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        value: https://shopflow.pages.dev
      - key: PORT
        value: 9090

databases:
  - name: shopflow-db
    databaseName: shopflowdb
    user: shopflow
    plan: free
